kind = "web"
previewPath = "/"
title = "Money Maestro"
version = "1.0.0"
id = "artifacts/money-maestro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24538

[services.development]
run = "pnpm --filter @workspace/money-maestro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/money-maestro", "run", "build" ]
publicDir = "artifacts/money-maestro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24538"
BASE_PATH = "/"
